name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Check versions
        run: uv run --frozen python scripts/check_version.py
      - name: Lint Python
        run: uv run --frozen ruff check src tests scripts apps/explore-lab/backend
      - name: Type-check Python
        run: uv run --frozen mypy src
      - name: Install Chromium
        run: uv run --frozen playwright install --with-deps chromium
      - name: Test Coworker
        run: uv run --frozen pytest -q
      - name: Test Explore Lab
        run: uv run --project apps/explore-lab/backend --frozen pytest -q apps/explore-lab/backend/tests

  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check Rust formatting
        run: cargo fmt --all -- --check
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config
      - run: cargo test --workspace --locked

  frontend:
    name: Frontend (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Web
            directory: web
            test: false
          - name: Explore Lab
            directory: apps/explore-lab/frontend
            test: false
          - name: Desktop
            directory: apps/coworker-desktop/desktop
            test: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.directory }}
      - if: ${{ matrix.test }}
        run: npm test
        working-directory: ${{ matrix.directory }}
      - run: npm run build
        working-directory: ${{ matrix.directory }}
      - if: matrix.name == 'Web' && github.actor != 'dependabot[bot]'
        name: Check committed web bundle
        run: |
          bundle_changes="$(git status --porcelain --untracked-files=all -- src/coworker/web)"
          if [ -n "$bundle_changes" ]; then
            printf '%s\n' "$bundle_changes"
            exit 1
          fi
