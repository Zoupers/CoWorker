[memory]
autonomous_context = "autonomous thought record"
manual_context = "manual full short-term memory compression"
legacy_anchor = '''[memory: summary of my previous actions]
{{summary}}'''
leaf_hint = "{{context}}. Summarize this activity as a continuous memory narrative, targeting about {{target}} tokens with a hard limit of {{budget}} tokens. Preserve the task thread, causality, key decisions, state changes, unfinished items, next continuation point, blockers, and risks. Reduce noisy quantities and identifiers: summarize BUGs, cases, commits, traceIds, and task counts as several, a batch, or multiple rounds unless a specific identifier is required for an unresolved item, blocker, acceptance evidence, an explicit user reference, or later investigation. End with “Continuation: ...” stating the current state, next step, or clear completion. Retain only high-signal names, projects, files/APIs, URLs, credentials, time commitments, and task names. Do not emit a Keywords list or blank output."
retry_empty = '''{{context}}

The previous summary was empty or unusable. Generate a non-empty continuous memory from the input, targeting about {{target}} tokens with a hard limit of {{budget}} tokens. Preserve the main thread, latest state, and continuation point. The final sentence must state the continuation status. Do not explain or output blank text.'''
retry_over = '''{{context}}

The previous summary was about {{last_tokens}} tokens, exceeding the {{budget}}-token budget. Compress it to at most {{budget}} tokens, targeting about {{target}} tokens. Preserve the continuous thread, key decisions, latest state, unfinished items, next continuation point, blockers, and risks. Remove repeated background, process logs, ordinary keywords, and Keywords lists. Summarize noisy BUG/case/commit/traceId/task counts unless a specific identifier is required for an unresolved item, blocker, acceptance evidence, or later investigation. End with the continuation state; do not explain, add format notes, or output blank text.'''
empty_messages = "Continuation: The summary for this period was empty; verify it against the original messages."
empty_logs = "Continuation: The summary for this period was empty; verify it against the original logs."
backfill_hint = "Historical backfill: summarize this activity as a continuous memory narrative, targeting about {{target}} tokens with a hard limit of {{budget}} tokens. Preserve the task thread, key decisions, unfinished items, next continuation point, blockers, and risks. Summarize noisy BUG/case/commit/traceId/task counts unless a specific identifier is required for an unresolved item, blocker, acceptance evidence, explicit user reference, or later investigation. Retain only high-signal names, projects, files/APIs, URLs, credentials, time commitments, and task names. End with “Continuation: ...”. Do not emit a Keywords list or blank output."

[memory.tree]
span = "{{start}} to {{end}}"
summary_piece = '''Summary segment {{index}}:
{{text}}'''
merge_hint = "Merge the summaries from the adjacent period ({{span}}) into one higher-level continuous memory, targeting about {{target}} tokens with a hard limit of {{budget}} tokens. Merge repeated and outdated states while retaining final conclusions; use the latest state when details conflict. Summarize noisy BUG/case/commit/traceId/task counts unless a specific identifier is required for an unresolved item, blocker, acceptance evidence, explicit user reference, or later investigation. Preserve the task thread, causality, key decisions, state changes, unfinished items, next continuation point, blockers, and risks. End with “Continuation: ...” stating the current state, next step, or completion. Retain only high-signal names, projects, files/APIs, URLs, credentials, time commitments, and task names. Do not emit an ordinary Keywords list or blank output."
truncated = "…(truncated: over budget)"
empty_fallback = "Continuation: The old summary for this period is empty and lacks reconstruction material; inspect the original logs."
memory_piece = '''Memory segment {{index}}:
{{text}}'''
resummarize_hint = "Recompress this existing short-term memory node, targeting about {{target}} tokens with a hard limit of {{budget}} tokens; prefer brevity over filling the budget. Preserve the continuous thread: what was happening, why, key decisions, state changes, unfinished items, the next continuation point, blockers, and risks. Summarize noisy BUG/case/commit/traceId/task counts unless a specific identifier is required for an unresolved item, blocker, acceptance evidence, explicit user reference, or later investigation. End with “Continuation: ...” stating the current state, next step, or completion. Retain only high-signal names, projects, files/APIs, URLs, credentials, time commitments, and task names. Do not emit an ordinary Keywords list or blank output."
summary_only = " · summary only"
header = "[memory {{span}} · {{count}} messages{{flag}}]"

