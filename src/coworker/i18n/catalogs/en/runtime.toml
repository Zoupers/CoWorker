{{hint}}{{content}}
==== End of segment ===='''
subjective_instruction = '''Compress the conversation segment above into a first-person memory summary from your own perspective.
Format: “I am/have ... Keywords: A, B, C, ...”
Include names of people, projects, tools, tasks, web links, credentials, and other proper nouns or critical details densely so they remain useful retrieval anchors.
Output plain text only, with no JSON or explanation.'''
objective_prompt = '''You are a memory compression assistant. Compress the following conversation history into a high-quality plain-text summary.

Important principles:
1. The summary's primary purpose is to act as a long-term-memory retrieval anchor. Include densely:
   - names of people, projects, tools, tasks, and other proper nouns
   - core concepts and technical terms discussed
   - topic words for key decisions
   - keywords and status for unfinished tasks
2. Format: third-person narrative followed by “Keywords: A, B, C, ...”
3. Output plain text only, without a JSON wrapper.'''
objective_hint = '''
Context hint: {{hint}}'''

