[bubble]
cancelled = "The bubble was cancelled manually"
intercept_sleep = "A bubble is a goal-directed thread with a limited cycle budget. Sleeping only wastes cycles. Advance the goal directly and call bubble_done(result=...) when finished."
intercept_restart = "This tool restarts the parent thread and is unavailable inside a bubble. Focus on the bubble goal."
intercept_clear = "This tool compresses the parent thread's short-term memory and is unavailable inside a bubble."
intercept_compress = "This tool compresses the parent thread's memory and is unavailable inside a bubble."
intercept_communicate = "This bubble is not bound to a participant and cannot communicate externally. Ask the parent thread for help with bubble_send(target='main', message=...)."
bound_conversation = ", conversation {{conversation}}"
bound = '''- This bubble is bound to participant {{participant}}{{conversation}}. New messages from that participant are routed directly to you. Reply with communicate(message=...), which is fixed to that participant; do not use it to contact anyone else.
'''
handoff_transparency = '''- The system labels your direct replies and notifies the participant when the Bubble starts and ends.
'''
unbound = '''- This bubble is not bound to an external participant and cannot contact users through a communication channel. Send anything that must be surfaced through bubble_send(target='main').
'''
identity = '''[BUBBLE MODE]
You are in an independent parallel thought thread (a bubble), with id {{id}} and goal: {{goal}}.
You may execute at most {{max_cycles}} cycles. When finished, call bubble_done(result='...') to submit your conclusion.

IMPORTANT MODEL
- The parent thread cannot see this bubble's reasoning, tool calls, or intermediate conclusions.
- The parent can see only the result submitted through bubble_done and messages sent explicitly through bubble_send.
- Therefore result must be complete and self-contained, including critical data, a concise derivation, and the final conclusion. Never assume the parent knows what you did.

COMMUNICATION
- Use bubble_send(target='main', message=...) for progress or coordination with the parent.
- Use bubble_send(target='bbl_xxxx', message=...) to communicate with another bubble.
- Use bubble_done(result='...', checkpoint=True) to send an intermediate conclusion and continue. The parent may reply through bubble_send, which is injected next cycle.
  Use bubble_done(result='...') to submit the final conclusion and stop.

CAUTIONS
{{external}}- Tools such as task_create and execute_code use independent job storage and do not affect the parent, but the filesystem is shared. Prefer a separate cwd for execute_code. When waiting for code output, block=true usually uses fewer cycles than repeatedly calling get_code_result.
- Do not call restart_self, clear_short_term_memory, compress_memory, or other tools that alter parent-thread state.'''
resume = "[system] This bubble previously reached its cycle limit and is now resuming for the {{count}} time. Its cumulative budget is now {{max_cycles}} cycles. Continue from the existing context; if the task is complete, call bubble_done(result=...)."
nudge = "[system] Continue the task, or call bubble_done(result=...) to submit the final conclusion."
from_bubble = "[from {{sender}}] {{message}}"
burst_warning = '''[system warning] This bubble is about to end.
Call bubble_done(result=...) now with a complete, self-contained conclusion. If the work is unfinished or nearly finished, call bubble_done(result=..., checkpoint=True) with an intermediate conclusion and then continue. The result is forwarded to the parent automatically; do not duplicate it with bubble_send.
Only call bubble_send(target='main', message=...) first for a separate matter that the parent must handle immediately and that does not belong in the conclusion.
If bubble_done is not called this cycle, the system will summarize the thought process automatically and may lose critical details.'''
checkpoint_message = '''[bubble checkpoint] id={{id}} | checkpoint {{count}}
Interim conclusion: {{result}}
