[memory]
autonomous_context = "自主思考记录"
manual_context = "手动全量短期记忆压缩"
legacy_anchor = '''[记忆：以下是我之前的行动摘要]
{{summary}}'''
leaf_hint = "{{context}}。将这段活动总结为连续记忆概要，目标约 {{target}} tokens，硬上限 {{budget}} tokens。优先保留任务主线、因果关系、关键决定、状态变化、未闭环事项、下一步接续点、阻塞/风险。数量/编号降噪：BUG、case、commit、traceId、任务数量默认概括为多个/一批/多轮/若干，不逐条罗列；只保留未闭环、阻塞、验收依据、用户明确引用或后续追查必需的具体编号。最后一句必须给出“接续：...”，说明当前状态/下一步/若已完成则写清已完成。关键锚点只保留高信号的人名、项目名、文件/接口、URL、账号/凭证、时间承诺、任务名；不要堆砌普通关键词，不要输出“关键词：”列表，不要空白。"
retry_empty = '''{{context}}

上一版摘要为空或不可用。请根据输入重新生成一段非空连续记忆；目标约 {{target}} tokens，硬上限 {{budget}} tokens。必须保留主线、最新状态和接续点，最后一句必须是接续状态；不要解释，不要输出空白。'''
retry_over = '''{{context}}

上一版摘要约 {{last_tokens}} tokens，超过 {{budget}} token 预算。请重新压缩到 {{budget}} tokens 以内，目标约 {{target}} tokens；优先保留连续主线、关键决定、最新状态、未闭环事项、下一步接续点、阻塞/风险。删掉重复背景、过程流水账、普通关键词和“关键词：”列表，只保留最关键的检索锚点。BUG/case/commit/traceId/任务数量默认概括为多个/一批/多轮/若干；只有未闭环、阻塞、验收依据或后续追查必需时才保留具体编号。最后一句必须是接续状态；不要解释，不要追加格式说明，不要空白。'''
empty_messages = "接续：该时间段摘要生成为空，需要根据原始消息重新确认。"
empty_logs = "接续：该时间段摘要生成为空，需要根据原始日志重新确认。"
backfill_hint = "历史回溯：将这段活动总结为连续记忆概要，目标约 {{target}} tokens，硬上限 {{budget}} tokens。优先保留任务主线、关键决定、未闭环事项、下一步接续点、阻塞/风险；数量/编号降噪：BUG、case、commit、traceId、任务数量默认概括为多个/一批/多轮/若干，不逐条罗列；只保留未闭环、阻塞、验收依据、用户明确引用或后续追查必需的具体编号。关键锚点只保留高信号的人名、项目名、文件/接口、URL、账号/凭证、时间承诺、任务名。最后一句必须给出“接续：...”；不要输出“关键词：”列表，不要空白。"

[memory.tree]
span = "{{start}} 至 {{end}}"
summary_piece = '''概要片段 {{index}}：
{{text}}'''
merge_hint = "将以下相邻时间（{{span}}）的若干概要合并为一段更高层次的连续记忆。目标约 {{target}} tokens，硬上限 {{budget}} tokens。先合并重复和过时状态，保留最终结论；冲突时写最新状态。数量/编号降噪：BUG、case、commit、traceId、任务数量默认概括为多个/一批/多轮/若干，不逐条罗列；只保留未闭环、阻塞、验收依据、用户明确引用或后续追查必需的具体编号。优先保留任务主线、因果关系、关键决定、状态变化、未闭环事项、下一步接续点、阻塞和风险。最后一句必须给出“接续：...”，说明当前状态/下一步/若已完成则写清已完成。关键锚点只保留高信号的人名、项目名、文件/接口、URL、账号/凭证、时间承诺、任务名；不要堆砌普通关键词，不要输出“关键词：”列表，不要空白。"
truncated = "…(超预算截断)"
empty_fallback = "接续：该时间段的旧摘要为空且缺少可重建材料，需要下钻原始日志确认。"
memory_piece = '''记忆片段 {{index}}：
{{text}}'''
resummarize_hint = "重新压缩这段已有短期记忆节点，目标约 {{target}} tokens，硬上限 {{budget}} tokens；宁可少写，不要贴满预算。不要丢失连续主线：保留当时在做什么、为什么、关键决定、状态变化、未闭环事项、下一步接续点、阻塞/风险。数量/编号降噪：BUG、case、commit、traceId、任务数量默认概括为多个/一批/多轮/若干，不逐条罗列；只保留未闭环、阻塞、验收依据、用户明确引用或后续追查必需的具体编号。最后一句必须给出“接续：...”，说明当前状态/下一步/若已完成则写清已完成。关键锚点只保留高信号的人名、项目名、文件/接口、URL、账号/凭证、时间承诺、任务名；不要堆砌普通关键词，不要输出“关键词：”列表，不要空白。"
summary_only = " · 仅摘要"
header = "[记忆 {{span}} · {{count}}条{{flag}}]"

