burst_warning = '''[系统预警] 泡泡即将破灭。
请立即调用 bubble_done(result=...) 提交完整、自包含的结论。如果当前工作尚未完成或即将完成，请调用 bubble_done(result=..., checkpoint=True) 提交中间结论，然后继续推进——result 会自动转交主线，无需再用 bubble_send 重复发送。
仅当另有需要主线立即处理且不宜放进结论的事项时，才在 bubble_done 之前先调用 bubble_send(target='main', message=...)。
